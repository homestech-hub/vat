<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile - Homestech VAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .bottom-nav-item.active { color: #1d4ed8; }
        .card-shadow { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        input[type="date"]::-webkit-inner-spin-button,
        input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.5; }
    </style>
</head>
<body class="bg-gray-50 pb-24">

    <div class="bg-blue-700 text-white p-4 sticky top-0 z-50 shadow-md flex justify-between items-center">
        <div>
            <h1 class="text-lg font-bold">Homestech System</h1>
            <p class="text-[10px] opacity-70" id="current-view-title">Danh sách Mua hàng</p>
        </div>
        <button onclick="location.reload()" class="p-2 active:scale-90 transition-transform"><i class="fas fa-sync-alt"></i></button>
    </div>

    <div id="search-container" class="p-3 bg-white border-b sticky top-[68px] z-40 space-y-2">
        <div class="relative border rounded-xl bg-gray-50">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                <i class="fas fa-search text-xs"></i>
            </span>
            <input type="text" id="mobileSearchInput" onkeyup="handleMobileFilter()" 
                placeholder="Tìm kiếm thông tin..." 
                class="w-full pl-9 pr-4 py-2 bg-transparent text-sm focus:outline-none">
        </div>
        
        <div class="flex items-center gap-2">
            <div class="flex-1 flex items-center gap-1 bg-gray-50 border rounded-lg px-2 py-1">
                <span class="text-[9px] font-bold text-gray-400 uppercase">Từ</span>
                <input type="date" id="mobileFromDate" onchange="handleMobileFilter()" class="bg-transparent text-xs w-full focus:outline-none">
            </div>
            <div class="flex-1 flex items-center gap-1 bg-gray-50 border rounded-lg px-2 py-1">
                <span class="text-[9px] font-bold text-gray-400 uppercase">Đến</span>
                <input type="date" id="mobileToDate" onchange="handleMobileFilter()" class="bg-transparent text-xs w-full focus:outline-none">
            </div>
            <button onclick="resetMobileFilter()" class="p-2 text-gray-400 hover:text-red-500 transition-colors"><i class="fas fa-undo-alt text-xs"></i></button>
        </div>
    </div>

    <div id="mobile-content" class="p-3">
        <div id="mobile-list" class="space-y-4">
            <div class="flex justify-center items-center mt-20">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-700"></div>
            </div>
        </div>
    </div>

    <button onclick="window.location.href='index.html'" class="fixed bottom-24 right-6 bg-blue-600 text-white w-12 h-12 rounded-full shadow-2xl flex items-center justify-center text-lg z-40 active:scale-95 transition-transform">
        <i class="fas fa-desktop"></i>
    </button>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-2 z-50 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
        <button onclick="renderMobileView('muahang')" id="nav-muahang" class="bottom-nav-item active flex flex-col items-center flex-1">
            <i class="fas fa-shopping-cart text-xl"></i><span class="text-[10px] mt-1 font-medium">Mua hàng</span>
        </button>
        <button onclick="renderMobileView('banhang')" id="nav-banhang" class="bottom-nav-item text-gray-400 flex flex-col items-center flex-1">
            <i class="fas fa-hand-holding-usd text-xl"></i><span class="text-[10px] mt-1 font-medium">Bán hàng</span>
        </button>
        <button onclick="renderMobileView('sanpham')" id="nav-sanpham" class="bottom-nav-item text-gray-400 flex flex-col items-center flex-1">
            <i class="fas fa-box text-xl"></i><span class="text-[10px] mt-1 font-medium">Sản phẩm</span>
        </button>
        <button onclick="renderMobileView('baocao')" id="nav-baocao" class="bottom-nav-item text-gray-400 flex flex-col items-center flex-1">
            <i class="fas fa-chart-pie text-xl"></i><span class="text-[10px] mt-1 font-medium">Báo cáo</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAaAGlSx44A4ZmTjJ1FDkdcmg962Q6ZpF0",
            authDomain: "homestechvat.firebaseapp.com",
            projectId: "homestechvat",
            storageBucket: "homestechvat.firebasestorage.app",
            messagingSenderId: "101376091255",
            appId: "1:101376091255:web:3a6209380585471c0f9272",
            databaseURL: "https://homestechvat-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let muahangData = [];
        let banhangData = [];
        let currentTab = 'muahang';

        const toIsoDate = (str) => {
            if (!str || !str.includes('/')) return str;
            const p = str.split('/'); return `${p[2]}-${p[1]}-${p[0]}`;
        };
        const parseDateInt = (str) => parseInt(toIsoDate(str).replace(/-/g, '')) || 0;

        window.renderMobileView = (type) => {
            currentTab = type;
            document.querySelectorAll('.bottom-nav-item').forEach(el => { el.classList.add('text-gray-400'); el.classList.remove('active'); });
            const activeNav = document.getElementById(`nav-${type}`);
            activeNav.classList.add('active'); activeNav.classList.remove('text-gray-400');
            
            const listContainer = document.getElementById('mobile-list');
            const searchBar = document.getElementById('search-container');
            const viewTitle = document.getElementById('current-view-title');

            // Ẩn hiện bộ lọc
            searchBar.style.display = (type === 'muahang' || type === 'banhang') ? 'block' : 'none';

            if (type === 'muahang') {
                viewTitle.innerText = "Danh sách Mua hàng";
                fetchData('invoices', 'muahang');
            } else if (type === 'banhang') {
                viewTitle.innerText = "Danh sách Bán hàng";
                fetchData('sales', 'banhang');
            } else if (type === 'sanpham') {
                viewTitle.innerText = "Danh mục Sản phẩm";
                fetchSanPham(listContainer);
            } else if (type === 'baocao') {
                viewTitle.innerText = "Báo cáo nhanh";
                fetchBaoCao(listContainer);
            }
        };

        function fetchData(node, type) {
            onValue(ref(db, node), (snapshot) => {
                const listContainer = document.getElementById('mobile-list');
                if (!snapshot.exists()) { listContainer.innerHTML = `<p class="text-center mt-10 text-gray-400">Trống</p>`; return; }
                
                const dataArray = Object.entries(snapshot.val()).sort((a, b) => {
                    const dateA = a[1].NgayNhap || a[1].NgayBan;
                    const dateB = b[1].NgayNhap || b[1].NgayBan;
                    return parseDateInt(dateB) - parseDateInt(dateA);
                });

                if (type === 'muahang') muahangData = dataArray;
                else banhangData = dataArray;

                handleMobileFilter();
            });
        }

        window.handleMobileFilter = () => {
            const query = document.getElementById('mobileSearchInput').value.toLowerCase();
            const fromDate = document.getElementById('mobileFromDate').value;
            const toDate = document.getElementById('mobileToDate').value;
            const container = document.getElementById('mobile-list');

            const sourceData = (currentTab === 'muahang') ? muahangData : banhangData;

            const filtered = sourceData.filter(([key, d]) => {
                const dateIso = toIsoDate(d.NgayNhap || d.NgayBan);
                const name = (d.NhaCungCap || d.KhachHang || "").toLowerCase();
                const idPhieu = (d.SoPhieuNhap || d.SoHoaDon || "").toLowerCase();
                const hasProduct = (d.ChiTiet || []).some(i => (i.MaSP || "").toLowerCase().includes(query));
                
                const matchSearch = name.includes(query) || idPhieu.includes(query) || hasProduct;
                const matchFrom = !fromDate || dateIso >= fromDate;
                const matchTo = !toDate || dateIso <= toDate;

                return matchSearch && matchFrom && matchTo;
            });

            renderList(filtered, container, currentTab);
        };

        function renderList(items, container, type) {
    if (items.length === 0) { container.innerHTML = `<p class="text-center text-gray-400 mt-10">Không tìm thấy kết quả</p>`; return; }
    
    container.innerHTML = items.map(([key, d]) => {
        const isDebt = (d.HinhThucThanhToan === "Công Nợ" || d.HinhThucThanhToan === "Chưa thanh toán");
        const payLabel = isDebt ? "Chưa thanh toán" : "Đã thanh toán";
        const payColor = isDebt ? "bg-red-100 text-red-600" : "bg-green-100 text-green-700";
        const date = d.NgayNhap || d.NgayBan;
        const mainName = d.NhaCungCap || d.KhachHang;
        const subId = d.SoPhieuNhap || d.SoHoaDon;

        return `
            <div class="bg-white p-4 rounded-2xl border border-gray-100 card-shadow">
                <div class="flex justify-between items-start mb-3">
                    <div>
                        <h3 class="font-bold text-gray-800 text-sm leading-tight">${mainName}</h3>
                        <p class="text-[10px] text-blue-600 mt-0.5"><i class="fas fa-hashtag text-[8px]"></i> ${subId || 'N/A'}</p>
                    </div>
                    <span class="text-[10px] font-bold text-gray-400">${date}</span>
                </div>
                
                <div class="space-y-1.5 mb-3">
                    ${(d.ChiTiet || []).map(i => `
                        <div class="bg-gray-50 p-2 rounded-lg">
                            <div class="text-xs text-gray-700 font-medium mb-1">${i.MaSP}</div>
                            <div class="flex justify-between items-center">
                                <span class="text-[10px] text-blue-600 font-bold">SL: ${i.SoLuong}</span>
                                <span class="text-[10px] text-gray-400 italic">Giá: ${(Number(i.GiaNhap || i.DonGia) || 0).toLocaleString()}đ</span>
                            </div>
                        </div>
                    `).join('')}
                </div>

                <div class="flex justify-between items-end pt-2 border-t border-dashed border-gray-100">
                    <div>
                        <p class="text-[9px] text-gray-400 font-bold uppercase">${type === 'muahang' ? 'Tổng chi' : 'Tổng thu'}</p>
                        <p class="text-base font-black ${type==='muahang'?'text-red-600':'text-blue-600'} font-mono">
                            ${(Number(d.ThanhTien) || 0).toLocaleString()}đ
                        </p>
                    </div>
                    <div class="text-right">
                        <span class="${payColor} px-2 py-0.5 rounded text-[9px] font-black uppercase">${payLabel}</span>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}
        window.resetMobileFilter = () => {
            document.getElementById('mobileSearchInput').value = "";
            document.getElementById('mobileFromDate').value = "";
            document.getElementById('mobileToDate').value = "";
            window.handleMobileFilter();
        };

        function fetchSanPham(container) {
            onValue(ref(db, 'products'), (snapshot) => {
                const prods = snapshot.exists() ? Object.values(snapshot.val()) : [];
                container.innerHTML = prods.map(p => `<div class="bg-white p-4 rounded-2xl flex items-center gap-4 card-shadow border border-gray-100"><div class="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center text-blue-600 font-bold text-xs">SP</div><div class="flex-1"><h4 class="font-bold text-gray-800 text-sm">${p.name}</h4><p class="text-[10px] text-gray-400">${p.code}</p></div><div class="text-right"><p class="text-blue-600 font-bold text-sm">${(p.cost || 0).toLocaleString()}đ</p></div></div>`).join('');
            });
        }

        function fetchBaoCao(container) {
            onValue(ref(db, 'invoices'), (invSnap) => {
                onValue(ref(db, 'sales'), (saleSnap) => {
                    let totalIn = 0, totalOut = 0, debtIn = 0, debtOut = 0;
                    
                    if(invSnap.exists()) Object.values(invSnap.val()).forEach(d => {
                        const amt = Number(d.ThanhTien) || 0; totalIn += amt;
                        if(d.HinhThucThanhToan === "Công Nợ" || d.HinhThucThanhToan === "Chưa thanh toán") debtIn += amt;
                    });
                    
                    if(saleSnap.exists()) Object.values(saleSnap.val()).forEach(d => {
                        const amt = Number(d.ThanhTien) || 0; totalOut += amt;
                        if(d.HinhThucThanhToan === "Công Nợ" || d.HinhThucThanhToan === "Chưa thanh toán") debtOut += amt;
                    });

                    container.innerHTML = `
                        <div class="space-y-4">
                            <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-6 rounded-3xl text-white shadow-lg">
                                <p class="text-xs opacity-80 uppercase font-bold mb-1">Doanh thu bán hàng</p>
                                <h2 class="text-2xl font-black">${totalOut.toLocaleString()}đ</h2>
                            </div>
                            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                                <div class="w-10 h-10 bg-red-50 text-red-500 rounded-full flex items-center justify-center"><i class="fas fa-arrow-down"></i></div>
                                <div><p class="text-xs text-gray-400 font-bold uppercase">Tổng chi nhập hàng</p><p class="text-lg font-black text-gray-800">${totalIn.toLocaleString()}đ</p></div>
                            </div>
                            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                                <div class="w-10 h-10 bg-orange-50 text-orange-500 rounded-full flex items-center justify-center"><i class="fas fa-exclamation-triangle"></i></div>
                                <div><p class="text-xs text-gray-400 font-bold uppercase">Công nợ khách hàng</p><p class="text-lg font-black text-orange-600">${debtOut.toLocaleString()}đ</p></div>
                            </div>
                        </div>`;
                });
            });
        }

        window.renderMobileView('muahang');
    </script>
</body>
</html>
