<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile - Homestech VAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .bottom-nav-item.active { color: #1d4ed8; }
    </style>
    
</head>
<body class="bg-gray-100 pb-20">

    <div class="bg-blue-700 text-white p-4 sticky top-0 z-50 shadow-md flex justify-between items-center">
        <h1 class="text-lg font-bold">Homestech Mobile</h1>
        <button onclick="location.reload()" class="p-2"><i class="fas fa-sync-alt"></i></button>
    </div>

    <div id="mobile-content" class="p-3">
        <div id="mobile-list" class="space-y-3">
            <p class="text-center text-gray-500 mt-10">Đang tải dữ liệu...</p>
        </div>
    </div>

    <button onclick="window.location.href='index.html'" class="fixed bottom-24 right-6 bg-blue-600 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-xl z-50">
        <i class="fas fa-desktop"></i>
    </button>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-3 z-50">
        <button onclick="renderMobileView('muahang')" class="bottom-nav-item active flex flex-col items-center">
            <i class="fas fa-shopping-cart text-xl"></i>
            <span class="text-xs">Mua hàng</span>
        </button>
        <button onclick="renderMobileView('sanpham')" class="bottom-nav-item flex flex-col items-center text-gray-400">
            <i class="fas fa-box text-xl"></i>
            <span class="text-xs">Sản phẩm</span>
        </button>
        <button onclick="renderMobileView('baocao')" class="bottom-nav-item flex flex-col items-center text-gray-400">
            <i class="fas fa-chart-pie text-xl"></i>
            <span class="text-xs">Báo cáo</span>
        </button>
    </nav>

    <script type="module">
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        // Giả định bạn đã cấu hình Firebase trong app.js, 
        // ở đây ta chỉ cần tận dụng logic hiển thị.
        
        window.renderMobileView = (type) => {
            const container = document.getElementById('mobile-list');
            // Logic render đơn giản cho Mobile
            container.innerHTML = `<p class='text-center'>Đang xem mục: ${type.toUpperCase()}</p>`;
            // Bạn có thể copy logic từ app.js sang đây và sửa template sang dạng Thẻ (Card)
        };
    </script>
</body>
</html>
