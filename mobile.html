<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile - Homestech VAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .bottom-nav-item.active { color: #1d4ed8; }
        .card-shadow { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 pb-24">

    <div class="bg-blue-700 text-white p-4 sticky top-0 z-50 shadow-md flex justify-between items-center">
        <div>
            <h1 class="text-lg font-bold">Homestech System</h1>
            <p class="text-[10px] opacity-70" id="current-view-title">Danh sách Mua hàng</p>
        </div>
        <button onclick="location.reload()" class="p-2 active:scale-90 transition-transform"><i class="fas fa-sync-alt"></i></button>
    </div>

    <div id="mobile-content" class="p-3">
        <div id="mobile-list" class="space-y-4">
            <div class="flex justify-center items-center mt-20">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-700"></div>
            </div>
        </div>
    </div>

    <button onclick="window.location.href='index.html'" class="fixed bottom-24 right-6 bg-blue-600 text-white w-12 h-12 rounded-full shadow-2xl flex items-center justify-center text-lg z-40 active:bg-blue-800">
        <i class="fas fa-desktop"></i>
    </button>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-2 z-50 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
        <button onclick="renderMobileView('muahang')" id="nav-muahang" class="bottom-nav-item active flex flex-col items-center flex-1 transition-colors">
            <i class="fas fa-shopping-cart text-xl"></i>
            <span class="text-[10px] mt-1 font-medium">Mua hàng</span>
        </button>
        <button onclick="renderMobileView('sanpham')" id="nav-sanpham" class="bottom-nav-item text-gray-400 flex flex-col items-center flex-1 transition-colors">
            <i class="fas fa-box text-xl"></i>
            <span class="text-[10px] mt-1 font-medium">Sản phẩm</span>
        </button>
        <button onclick="renderMobileView('baocao')" id="nav-baocao" class="bottom-nav-item text-gray-400 flex flex-col items-center flex-1 transition-colors">
            <i class="fas fa-chart-pie text-xl"></i>
            <span class="text-[10px] mt-1 font-medium">Báo cáo</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAaAGlSx44A4ZmTjJ1FDkdcmg962Q6ZpF0",
            authDomain: "homestechvat.firebaseapp.com",
            projectId: "homestechvat",
            storageBucket: "homestechvat.firebasestorage.app",
            messagingSenderId: "101376091255",
            appId: "1:101376091255:web:3a6209380585471c0f9272",
            databaseURL: "https://homestechvat-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let cacheData = { muahang: null, sanpham: null };

        // --- HÀM SẮP XẾP NGÀY (Z-A) ---
        const parseDate = (dateStr) => {
            if (!dateStr) return 0;
            const parts = dateStr.split('/');
            return parts.length === 3 ? parseInt(parts[2] + parts[1] + parts[0]) : 0;
        };

        window.renderMobileView = (type) => {
            // Update UI Navigation
            document.querySelectorAll('.bottom-nav-item').forEach(el => el.classList.add('text-gray-400'));
            document.querySelectorAll('.bottom-nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${type}`).classList.add('active');
            document.getElementById(`nav-${type}`).classList.remove('text-gray-400');
            
            const listContainer = document.getElementById('mobile-list');
            const viewTitle = document.getElementById('current-view-title');

            if (type === 'muahang') {
                viewTitle.innerText = "Danh sách Mua hàng";
                renderMuaHang(listContainer);
            } else if (type === 'sanpham') {
                viewTitle.innerText = "Danh mục Sản phẩm";
                renderSanPham(listContainer);
            } else if (type === 'baocao') {
                viewTitle.innerText = "Báo cáo nhanh";
                renderBaoCao(listContainer);
            }
        };

        function renderMuaHang(container) {
            onValue(ref(db, 'invoices'), (snapshot) => {
                if (!snapshot.exists()) {
                    container.innerHTML = `<p class="text-center text-gray-400 mt-10">Không có đơn hàng</p>`;
                    return;
                }
                const data = snapshot.val();
                cacheData.muahang = data;
                
                const sorted = Object.entries(data).sort((a, b) => parseDate(b[1].NgayNhap) - parseDate(a[1].NgayNhap));
                
                container.innerHTML = sorted.map(([key, d]) => {
                    // Logic thanh toán
                    let payLabel = "N/A", payColor = "bg-gray-100 text-gray-600";
                    if (d.HinhThucThanhToan === "Công Nợ") {
                        payLabel = "Chưa thanh toán"; payColor = "bg-red-100 text-red-600";
                    } else if (d.HinhThucThanhToan === "Tiền Mặt" || d.HinhThucThanhToan === "Chuyển Khoản") {
                        payLabel = "Đã thanh toán"; payColor = "bg-green-100 text-green-600";
                    }

                    return `
                        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 card-shadow">
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <h3 class="font-bold text-gray-800 text-sm leading-tight">${d.NhaCungCap}</h3>
                                    <p class="text-[10px] text-blue-600 font-medium mt-1"><i class="fas fa-hashtag"></i> ${d.SoPhieuNhap || 'N/A'}</p>
                                </div>
                                <span class="text-[10px] font-bold text-gray-400">${d.NgayNhap}</span>
                            </div>
                            
                            <div class="space-y-2 mb-4">
                                ${(d.ChiTiet || []).map(i => `
                                    <div class="flex justify-between items-center text-xs bg-gray-50 p-2 rounded-lg">
                                        <span class="text-gray-600">${i.MaSP}</span>
                                        <span class="font-bold text-blue-700">x${i.SoLuong}</span>
                                    </div>
                                `).join('')}
                            </div>

                            <div class="flex justify-between items-center pt-3 border-t border-dashed border-gray-100">
                                <div class="flex flex-col">
                                    <span class="text-[10px] text-gray-400 uppercase font-bold tracking-wider">Tổng tiền</span>
                                    <span class="text-base font-black text-red-600 font-mono">${(Number(d.ThanhTien) || 0).toLocaleString()}đ</span>
                                </div>
                                <div class="text-right">
                                    <span class="${payColor} px-2 py-1 rounded-md text-[10px] font-black uppercase">${payLabel}</span>
                                    <p class="text-[9px] text-gray-400 mt-1">${d.TinhTrangHoaDon || ''}</p>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            });
        }

        function renderSanPham(container) {
            onValue(ref(db, 'products'), (snapshot) => {
                if (!snapshot.exists()) {
                    container.innerHTML = `<p class="text-center text-gray-400 mt-10">Chưa có sản phẩm</p>`;
                    return;
                }
                const prods = Object.values(snapshot.val());
                container.innerHTML = prods.map(p => `
                    <div class="bg-white p-4 rounded-2xl flex items-center gap-4 card-shadow border border-gray-100">
                        <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center text-blue-600 text-lg font-bold">
                            ${p.code ? p.code.substring(0,2) : 'SP'}
                        </div>
                        <div class="flex-1">
                            <h4 class="font-bold text-gray-800 text-sm">${p.name}</h4>
                            <p class="text-xs text-gray-400">${p.code} | ĐVT: ${p.unit || 'Cái'}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-blue-600 font-bold text-sm">${(p.cost || 0).toLocaleString()}đ</p>
                            <p class="text-[10px] text-gray-500">Tồn: <span class="text-orange-600 font-bold">${p.stock || 0}</span></p>
                        </div>
                    </div>
                `).join('');
            });
        }

        function renderBaoCao(container) {
            onValue(ref(db, 'invoices'), (snapshot) => {
                const data = snapshot.val() || {};
                let total = 0, debt = 0, count = 0;
                
                Object.values(data).forEach(d => {
                    const amount = Number(d.ThanhTien) || 0;
                    total += amount;
                    count++;
                    if (d.HinhThucThanhToan === "Công Nợ") debt += amount;
                });

                container.innerHTML = `
                    <div class="grid grid-cols-1 gap-4">
                        <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-6 rounded-3xl text-white shadow-lg">
                            <p class="text-xs opacity-80 uppercase font-bold mb-1">Tổng nhập hàng</p>
                            <h2 class="text-3xl font-black font-mono">${total.toLocaleString()}đ</h2>
                            <p class="text-[10px] mt-4 opacity-60 italic">* Dữ liệu thời gian thực</p>
                        </div>
                        
                        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                            <div class="w-10 h-10 bg-red-50 text-red-500 rounded-full flex items-center justify-center"><i class="fas fa-exclamation-circle"></i></div>
                            <div>
                                <p class="text-xs text-gray-400 font-bold">CÔNG NỢ HIỆN TẠI</p>
                                <p class="text-xl font-black text-red-600 font-mono">${debt.toLocaleString()}đ</p>
                            </div>
                        </div>

                        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                            <div class="w-10 h-10 bg-green-50 text-green-500 rounded-full flex items-center justify-center"><i class="fas fa-file-invoice"></i></div>
                            <div>
                                <p class="text-xs text-gray-400 font-bold">TỔNG ĐƠN HÀNG</p>
                                <p class="text-xl font-black text-gray-800 font-mono">${count} phiếu</p>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // Khởi tạo view mặc định
        window.renderMobileView('muahang');

    </script>
</body>
</html>
