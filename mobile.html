<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile - Homestech VAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .bottom-nav-item.active { color: #1d4ed8; }
        .card-shadow { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        input[type="date"]::-webkit-inner-spin-button,
        input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.5; }
    </style>
</head>
<body class="bg-gray-50 pb-24">

    <div class="bg-blue-700 text-white p-4 sticky top-0 z-50 shadow-md flex justify-between items-center">
        <div>
            <h1 class="text-lg font-bold">Homestech System</h1>
            <p class="text-[10px] opacity-70" id="current-view-title">Danh sách Mua hàng</p>
        </div>
        <button onclick="location.reload()" class="p-2 active:scale-90 transition-transform"><i class="fas fa-sync-alt"></i></button>
    </div>

    <div id="search-container" class="p-3 bg-white border-b sticky top-[68px] z-40 space-y-2">
        <div class="relative border rounded-xl bg-gray-50">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                <i class="fas fa-search text-xs"></i>
            </span>
            <input type="text" id="mobileSearchInput" onkeyup="handleMobileFilter()" 
                placeholder="Tìm NCC, số phiếu, sản phẩm..." 
                class="w-full pl-9 pr-4 py-2 bg-transparent text-sm focus:outline-none">
        </div>
        
        <div class="flex items-center gap-2">
            <div class="flex-1 flex items-center gap-1 bg-gray-50 border rounded-lg px-2 py-1">
                <span class="text-[9px] font-bold text-gray-400 uppercase">Từ</span>
                <input type="date" id="mobileFromDate" onchange="handleMobileFilter()" class="bg-transparent text-xs w-full focus:outline-none">
            </div>
            <div class="flex-1 flex items-center gap-1 bg-gray-50 border rounded-lg px-2 py-1">
                <span class="text-[9px] font-bold text-gray-400 uppercase">Đến</span>
                <input type="date" id="mobileToDate" onchange="handleMobileFilter()" class="bg-transparent text-xs w-full focus:outline-none">
            </div>
            <button onclick="resetMobileFilter()" class="p-2 text-gray-400 hover:text-red-500"><i class="fas fa-undo-alt text-xs"></i></button>
        </div>
    </div>

    <div id="mobile-content" class="p-3">
        <div id="mobile-list" class="space-y-4">
            <div class="flex justify-center items-center mt-20">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-700"></div>
            </div>
        </div>
    </div>

    <button onclick="window.location.href='index.html'" class="fixed bottom-24 right-6 bg-blue-600 text-white w-12 h-12 rounded-full shadow-2xl flex items-center justify-center text-lg z-40">
        <i class="fas fa-desktop"></i>
    </button>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-2 z-50">
        <button onclick="renderMobileView('muahang')" id="nav-muahang" class="bottom-nav-item active flex flex-col items-center flex-1">
            <i class="fas fa-shopping-cart text-xl"></i><span class="text-[10px] mt-1">Mua hàng</span>
        </button>
        <button onclick="renderMobileView('sanpham')" id="nav-sanpham" class="bottom-nav-item text-gray-400 flex flex-col items-center flex-1">
            <i class="fas fa-box text-xl"></i><span class="text-[10px] mt-1">Sản phẩm</span>
        </button>
        <button onclick="renderMobileView('baocao')" id="nav-baocao" class="bottom-nav-item text-gray-400 flex flex-col items-center flex-1">
            <i class="fas fa-chart-pie text-xl"></i><span class="text-[10px] mt-1">Báo cáo</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAaAGlSx44A4ZmTjJ1FDkdcmg962Q6ZpF0",
            authDomain: "homestechvat.firebaseapp.com",
            projectId: "homestechvat",
            storageBucket: "homestechvat.firebasestorage.app",
            messagingSenderId: "101376091255",
            appId: "1:101376091255:web:3a6209380585471c0f9272",
            databaseURL: "https://homestechvat-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let fullData = []; 
        let currentTab = 'muahang';

        // --- CHUYỂN ĐỔI NGÀY ĐỂ SO SÁNH ---
        const toIsoDate = (str) => {
            if (!str || !str.includes('/')) return str;
            const p = str.split('/'); return `${p[2]}-${p[1]}-${p[0]}`;
        };
        const parseDateInt = (str) => parseInt(toIsoDate(str).replace(/-/g, '')) || 0;

        window.renderMobileView = (type) => {
            currentTab = type;
            document.querySelectorAll('.bottom-nav-item').forEach(el => { el.classList.add('text-gray-400'); el.classList.remove('active'); });
            const activeNav = document.getElementById(`nav-${type}`);
            activeNav.classList.add('active'); activeNav.classList.remove('text-gray-400');
            
            const listContainer = document.getElementById('mobile-list');
            const searchBar = document.getElementById('search-container');
            searchBar.style.display = (type === 'muahang') ? 'block' : 'none';

            if (type === 'muahang') fetchMuaHang(listContainer);
            else if (type === 'sanpham') fetchSanPham(listContainer);
            else if (type === 'baocao') fetchBaoCao(listContainer);
        };

        function fetchMuaHang(container) {
            onValue(ref(db, 'invoices'), (snapshot) => {
                if (!snapshot.exists()) { container.innerHTML = `<p class="text-center mt-10">Trống</p>`; return; }
                fullData = Object.entries(snapshot.val()).sort((a, b) => parseDateInt(b[1].NgayNhap) - parseDateInt(a[1].NgayNhap));
                handleMobileFilter(); // Áp dụng lọc ngay khi tải dữ liệu
            });
        }

        // --- LOGIC LỌC ĐA NĂNG (TÌM KIẾM + NGÀY THÁNG) ---
        window.handleMobileFilter = () => {
            if (currentTab !== 'muahang') return;

            const query = document.getElementById('mobileSearchInput').value.toLowerCase();
            const fromDate = document.getElementById('mobileFromDate').value;
            const toDate = document.getElementById('mobileToDate').value;
            const container = document.getElementById('mobile-list');

            const filtered = fullData.filter(([key, d]) => {
                const dateIso = toIsoDate(d.NgayNhap);
                const matchSearch = (d.NhaCungCap || "").toLowerCase().includes(query) || 
                                    (d.SoPhieuNhap || "").toLowerCase().includes(query) ||
                                    (d.ChiTiet || []).some(i => (i.MaSP || "").toLowerCase().includes(query));
                
                const matchFrom = !fromDate || dateIso >= fromDate;
                const matchTo = !toDate || dateIso <= toDate;

                return matchSearch && matchFrom && matchTo;
            });

            displayMuaHang(filtered, container);
        };

        window.resetMobileFilter = () => {
            document.getElementById('mobileSearchInput').value = "";
            document.getElementById('mobileFromDate').value = "";
            document.getElementById('mobileToDate').value = "";
            window.handleMobileFilter();
        };

        function displayMuaHang(items, container) {
            if (items.length === 0) { container.innerHTML = `<p class="text-center text-gray-400 mt-10">Không tìm thấy kết quả</p>`; return; }
            container.innerHTML = items.map(([key, d]) => {
                let payLabel = (d.HinhThucThanhToan === "Công Nợ") ? "Chưa thanh toán" : "Đã thanh toán";
                let payColor = (d.HinhThucThanhToan === "Công Nợ") ? "bg-red-100 text-red-600" : "bg-green-100 text-green-600";
                return `
                    <div class="bg-white p-4 rounded-2xl border border-gray-100 card-shadow">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <h3 class="font-bold text-gray-800 text-sm">${d.NhaCungCap}</h3>
                                <p class="text-[10px] text-blue-600 mt-0.5"><i class="fas fa-hashtag text-[8px]"></i> ${d.SoPhieuNhap || 'N/A'}</p>
                            </div>
                            <span class="text-[10px] font-bold text-gray-400">${d.NgayNhap}</span>
                        </div>
                        <div class="space-y-1.5 mb-3">
                            ${(d.ChiTiet || []).map(i => `<div class="flex justify-between text-xs bg-gray-50 p-2 rounded-lg"><span>${i.MaSP}</span><span class="font-bold text-blue-600">x${i.SoLuong}</span></div>`).join('')}
                        </div>
                        <div class="flex justify-between items-end pt-2 border-t border-dashed border-gray-100">
                            <div><p class="text-[9px] text-gray-400 font-bold uppercase">Tổng tiền</p><p class="text-base font-black text-red-600 font-mono">${(Number(d.ThanhTien) || 0).toLocaleString()}đ</p></div>
                            <div class="text-right"><span class="${payColor} px-2 py-0.5 rounded text-[9px] font-black uppercase">${payLabel}</span></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ... (Các hàm fetchSanPham và fetchBaoCao giữ nguyên như bản trước) ...
        function fetchSanPham(container) {
            onValue(ref(db, 'products'), (snapshot) => {
                const prods = snapshot.exists() ? Object.values(snapshot.val()) : [];
                container.innerHTML = prods.map(p => `<div class="bg-white p-4 rounded-2xl flex items-center gap-4 card-shadow border border-gray-100"><div class="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center text-blue-600 font-bold text-xs">${p.code ? p.code.substring(0,3) : 'SP'}</div><div class="flex-1"><h4 class="font-bold text-gray-800 text-sm">${p.name}</h4><p class="text-[10px] text-gray-400">${p.code}</p></div><div class="text-right"><p class="text-blue-600 font-bold text-sm">${(p.cost || 0).toLocaleString()}đ</p></div></div>`).join('');
            });
        }

        function fetchBaoCao(container) {
            onValue(ref(db, 'invoices'), (snapshot) => {
                const data = snapshot.val() || {};
                let total = 0, debt = 0;
                Object.values(data).forEach(d => {
                    const amount = Number(d.ThanhTien) || 0;
                    total += amount; if (d.HinhThucThanhToan === "Công Nợ") debt += amount;
                });
                container.innerHTML = `<div class="space-y-4"><div class="bg-gradient-to-br from-blue-600 to-blue-800 p-6 rounded-3xl text-white shadow-lg"><p class="text-xs opacity-80 uppercase font-bold mb-1">Tổng nhập hàng</p><h2 class="text-2xl font-black">${total.toLocaleString()}đ</h2></div><div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4"><div class="w-10 h-10 bg-red-50 text-red-500 rounded-full flex items-center justify-center"><i class="fas fa-exclamation-circle"></i></div><div><p class="text-xs text-gray-400 font-bold uppercase">Công nợ hiện tại</p><p class="text-xl font-black text-red-600">${debt.toLocaleString()}đ</p></div></div></div>`;
            });
        }

        window.renderMobileView('muahang');
    </script>
</body>
</html>
